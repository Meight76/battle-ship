<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="./template.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Jersey+10&family=Mochiy+Pop+P+One&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
        <title>Battle Ship</title>
    </head>
    <body>
        <header class="header">
            <span class="mochiy-font">BattleShip project</span>
        </header>
        <section class="stats-bar">
            <div class="player1-stats">
                <span class="player1-pont jersey-font">0</span>
            </div>
            <div class="control-btns">
                <button class="start jersey-font">start</button>
                <button class="restart jersey-font">restart</button>
            </div>
            <div class="player2-stats">
                <span class="player2-pont jersey-font">0</span>
            </div>
        </section>
        <main class="boards-section">
            <div class="board-1 jersey-font" data-player="player"></div>
            <div class="board-2 jersey-font"></div>
        </main>
        <section class="player-info">
            <div class="player-turn">
                <span class="turn poppins-font">pink turn</span>
                <span class="round-number poppins-font">round:
                    <span class="num poppins-font">2</span>
                </span>
            </div>
            <button class="ship-hand">
                <span class="place-ship-span poppins-font">Place Ship</span>
            </button>
        </section>

        <footer class="footer">
            <Span class="poppins-font">Educational Project </Span><span class="poppins-font">© Meight76</Span>
        </footer>
    </body>
</html>
